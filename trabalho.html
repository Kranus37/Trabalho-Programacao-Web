<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Star Wars</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #ffe81f;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .caixa {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            border: 2px solid #ffe81f;
            border-radius: 10px;
            background-color: #111;
        }
        button {
            background-color: #ffe81f;
            color: #000;
            border: none;
            padding: 15px;
            margin: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            width: 90%;
            cursor: pointer;
        }
        button:hover {
            background-color: #fff;
        }
        img {
            max-width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ffe81f;
            margin-top: 10px;
        }
        h1 {
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 28px;
            text-shadow: 0 0 10px #ffe81f, 0 0 20px #ffe81f;
            letter-spacing: 3px;
        }
        #contador {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }
        #barra-fundo {
            background-color: #333;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
        }
        #barra-progresso {
            background-color: #ffe81f;
            height: 10px;
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div id="tela1" class="caixa">
        <h1>QUIZ STAR WARS</h1>
        <p>Há muito tempo, em uma galáxia muito, muito distante...</p>
        <p>Responda 10 perguntas e descubra qual personagem da Força você seria!</p>
        <button onclick="jogo.iniciar()">Iniciar Jornada</button>
    </div>

    <div id="tela2" class="caixa" style="display:none;">
        <p id="contador"></p>
        <div id="barra-fundo"><div id="barra-progresso"></div></div>
        <h2 id="titulo-pergunta"></h2>
        <div id="caixa-opcoes"></div>
    </div>

    <div id="tela3" class="caixa" style="display:none;">
        <h1>Seu destino foi selado!</h1>
        <h2 id="res-nome"></h2>
        <img id="res-img" src="" alt="">
        <p id="res-desc"></p>
        <div id="res-placar" style="margin: 15px 0; text-align: left; border-top: 1px solid #ffe81f; padding-top: 15px;"></div>
        <button onclick="jogo.iniciar()">Tentar Novamente</button>
    </div>

    <script>
        class Personagem {
            constructor(nome, imagem, descricao) {
                this.nome = nome;
                this.imagem = imagem;
                this.descricao = descricao;
                this.pontos = 0;
            }
        }

        class Quiz {
            constructor() {
                this.personagens = [
                    new Personagem("Luke Skywalker", "luke.jpg", "Você é um herói altruísta! Valoriza a paz e a amizade. A luz da Força é forte em você."),
                    new Personagem("Darth Vader", "vader.jpg", "Você é movido pela ambição e ordem. O lado sombrio flui através de você."),
                    new Personagem("Han Solo", "han.jpg", "Você é um rebelde e um espírito livre! Confia no seu próprio instinto e improviso.")
                ];

                this.perguntas = [
                    {
                        texto: "Qual é o seu objetivo de vida principal?",
                        opcoes: [
                            { texto: "Trazer paz e proteger os outros", pontos: [3, 1, 2] },
                            { texto: "Alcançar poder e impor ordem", pontos: [1, 3, 2] },
                            { texto: "Viver livre e ganhar muito dinheiro", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Como você resolve um problema difícil?",
                        opcoes: [
                            { texto: "Com paciência, calma e meditação", pontos: [3, 1, 2] },
                            { texto: "Com força bruta e intimidação", pontos: [1, 3, 2] },
                            { texto: "Na base do improviso e lábia", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Qual seria o seu veículo ideal?",
                        opcoes: [
                            { texto: "Um caça estelar rápido e ágil", pontos: [3, 1, 2] },
                            { texto: "Uma nave de combate imperial", pontos: [1, 3, 2] },
                            { texto: "Um cargueiro velho, mas modificado", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Onde você preferiria morar?",
                        opcoes: [
                            { texto: "Em um planeta calmo e isolado", pontos: [3, 1, 2] },
                            { texto: "No centro de comando militar", pontos: [1, 3, 2] },
                            { texto: "Viajando constantemente pela galáxia", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Quem você escolheria como líder?",
                        opcoes: [
                            { texto: "Um mestre antigo e muito sábio", pontos: [3, 1, 2] },
                            { texto: "Um imperador com poder absoluto", pontos: [1, 3, 2] },
                            { texto: "Eu não sigo líderes, sou meu chefe", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Qual é a sua arma de escolha?",
                        opcoes: [
                            { texto: "Sabre de luz azul ou verde", pontos: [3, 1, 2] },
                            { texto: "Sabre de luz vermelho", pontos: [1, 3, 2] },
                            { texto: "Um bom e velho blaster na cintura", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Como você age quando está sob pressão?",
                        opcoes: [
                            { texto: "Mantenho o foco e a calma", pontos: [3, 1, 2] },
                            { texto: "Deixo a minha raiva me guiar", pontos: [1, 3, 2] },
                            { texto: "Atiro primeiro e pergunto depois", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Qual a sua opinião sobre as regras?",
                        opcoes: [
                            { texto: "São fundamentais para a paz", pontos: [3, 1, 2] },
                            { texto: "Sou eu quem dita as regras", pontos: [1, 3, 2] },
                            { texto: "Foram feitas para serem ignoradas", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Qual é o seu estilo de vestimenta?",
                        opcoes: [
                            { texto: "Roupas claras e confortáveis", pontos: [3, 1, 2] },
                            { texto: "Armadura escura e capa", pontos: [1, 3, 2] },
                            { texto: "Jaqueta de couro e botas", pontos: [2, 1, 3] }
                        ]
                    },
                    {
                        texto: "Como você trata as pessoas próximas?",
                        opcoes: [
                            { texto: "Dou a minha vida por elas", pontos: [3, 1, 2] },
                            { texto: "Uso-as para alcançar meus objetivos", pontos: [1, 3, 2] },
                            { texto: "Reclamo, mas no fim eu ajudo", pontos: [2, 1, 3] }
                        ]
                    }
                ];

                this.atual = 0;
            }

            iniciar() {
                this.atual = 0;

                for (let i = 0; i < this.personagens.length; i++) {
                    this.personagens[i].pontos = 0;
                }

                document.getElementById("tela1").style.display = "none";
                document.getElementById("tela3").style.display = "none";
                document.getElementById("tela2").style.display = "block";

                this.mostrarPergunta();
            }

            mostrarPergunta() {
                let pergunta = this.perguntas[this.atual];

                document.getElementById("contador").innerText = "Pergunta " + (this.atual + 1) + " de " + this.perguntas.length;
                document.getElementById("barra-progresso").style.width = (this.atual / this.perguntas.length * 100) + "%";
                document.getElementById("titulo-pergunta").innerText = pergunta.texto;
                document.getElementById("caixa-opcoes").innerHTML = "";

                for (let i = 0; i < pergunta.opcoes.length; i++) {
                    let btn = document.createElement("button");
                    btn.innerText = pergunta.opcoes[i].texto;
                    btn.onclick = () => this.responder(pergunta.opcoes[i].pontos);
                    document.getElementById("caixa-opcoes").appendChild(btn);
                }
            }

            responder(pontosOpcao) {
                for (let i = 0; i < this.personagens.length; i++) {
                    this.personagens[i].pontos += pontosOpcao[i];
                }

                this.atual++;

                if (this.atual < this.perguntas.length) {
                    this.mostrarPergunta();
                } else {
                    this.mostrarResultado();
                }
            }

            mostrarResultado() {
                let vencedor = this.personagens[0];

                for (let i = 1; i < this.personagens.length; i++) {
                    if (this.personagens[i].pontos > vencedor.pontos) {
                        vencedor = this.personagens[i];
                    }
                }

                document.getElementById("tela2").style.display = "none";
                document.getElementById("tela3").style.display = "block";

                document.getElementById("res-nome").innerText = vencedor.nome;
                document.getElementById("res-img").src = vencedor.imagem;
                document.getElementById("res-desc").innerText = vencedor.descricao;

                let placar = document.getElementById("res-placar");
                placar.innerHTML = "<strong>Pontuação obtida:</strong>";

                for (let i = 0; i < this.personagens.length; i++) {
                    let linha = document.createElement("p");
                    linha.innerText = this.personagens[i].nome + ": " + this.personagens[i].pontos + " pontos";
                    placar.appendChild(linha);
                }
            }
        }

        const jogo = new Quiz();
    </script>
</body>
</html>
